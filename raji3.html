<div class="bg">
  <div class="card">
    <h1>Hi my love ❤️</h1>

    <div class="letter">
      <span id="text"></span><span class="cursor">|</span>
    </div>
  </div>
</div>

<script type="text/javascript">
const lines = [
  "I don’t always find the right words…",
  "\n\nbut loving you has always been easy.",
  "\n\nYou are my calm,",
  "\nmy happiness,",
  "\nand my forever.",
  "\n\nStill choosing you.",
  "\nAlways 💍with love GOKUL"
];

const speed = 50; // typing speed (lower = slower)
let lineIndex = 0;
let charIndex = 0;
const textEl = document.getElementById("text");

function typeLine() {
  if (lineIndex < lines.length) {
    if (charIndex < lines[lineIndex].length) {
      textEl.innerHTML += lines[lineIndex].charAt(charIndex);
      charIndex++;
      setTimeout(typeLine, speed);
    } else {
      lineIndex++;
      charIndex = 0;
      setTimeout(typeLine, 600); // pause between lines
    }
  }
}

typeLine();

</script>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: "Playfair Display", serif;
}

.bg {
  height: 100vh;
  background: linear-gradient(135deg, #fbc2eb, #a6c1ee);
  display: flex;
  justify-content: center;
  align-items: center;
}

.card {
  width: 360px;
  padding: 30px;
  border-radius: 20px;
  background: rgba(255, 255, 255, 0.3);
  backdrop-filter: blur(15px);
  box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
  text-align: center;
}

h1 {
  margin-bottom: 20px;
}

.letter {
  font-family: "Dancing Script", cursive;
  font-size: 22px;
  line-height: 1.6;
  min-height: 140px;
}

.cursor {
  animation: blink 1s infinite;
}

@keyframes blink {
  0%, 50%, 100% { opacity: 1; }
  25%, 75% { opacity: 0; }
}

</style>
