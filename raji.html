

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Rajalakshmi ❤️</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(to right, #ff758c, #ff7eb3);
    color: white;
    text-align: center;
}

/* Container */
.container {
    padding: 15px;
}

/* Heading */
h1 {
    font-size: 2.2em;
}

h2 {
    font-size: 1.5em;
}

/* Slideshow */
.slideshow {
    width: 95%;
    max-width: 400px;
    margin: auto;
}

.slide {
    width: 100%;
    display: none;
    border-radius: 15px;
}

/* Typing Text */
.typing {
    margin-top: 20px;
    font-size: 1.2em;
    min-height: 80px;
    padding: 10px;
}

/* Button */
button {
    padding: 10px 20px;
    border: none;
    background: white;
    color: #ff4e8a;
    border-radius: 20px;
    font-weight: bold;
    margin-top: 15px;
}

/* Canvas fireworks */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    pointer-events: none;
}
</style>
</head>

<body onclick="fireworks(event)">

<canvas id="canvas"></canvas>

<div class="container">
    <h1>🎂 Happy Birthday My Love ❤️</h1>
    <h2>My Dear Rajalakshmi 💕</h2>

    <!-- Slideshow -->
    <div class="slideshow">
        <img class="slide" src="Photo1.png">
        <img class="slide" src="Photo2.png">
        <img class="slide" src="Photo3.JPG">
        <img class="slide" src="Photo4.JPG">
        <img class="slide" src="Photo5.JPG">
    </div>

    <!-- Typing Letter -->
    <div class="typing" id="typing"></div>

    <button onclick="startTyping()">Read My Letter 💌</button>
</div>

<script>
// -------- SLIDESHOW --------
let slideIndex = 0;
function showSlides() {
    let slides = document.getElementsByClassName("slide");
    for (let i = 0; i < slides.length; i++) {
        slides[i].style.display = "none";
    }
    slideIndex++;
    if (slideIndex > slides.length) slideIndex = 1;
    slides[slideIndex - 1].style.display = "block";
    setTimeout(showSlides, 2500);
}
showSlides();

// -------- TYPING LETTER --------
const message = "My Dear Rajalakshmi ❤️,\n\n" +
"You are the most beautiful part of my life.\n" +
"Every moment with you feels like a dream come true.\n" +
"Your smile lights up my darkest days.\n\n" +
"On your special day, I just want to say...\n" +
"I love you more than words can express 💕\n\n" +
"Happy Birthday My Love 🎂❤️";

let i = 0;
function startTyping() {
    const typingDiv = document.getElementById("typing");
    typingDiv.innerHTML = "";
    i = 0;
    typeWriter();
}

function typeWriter() {
    if (i < message.length) {
        document.getElementById("typing").innerHTML += message.charAt(i);
        i++;
        setTimeout(typeWriter, 40);
    }
}

// -------- FIREWORKS --------
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

function fireworks(e) {
    for (let i = 0; i < 30; i++) {
        particles.push({
            x: e.clientX,
            y: e.clientY,
            dx: (Math.random() - 0.5) * 5,
            dy: (Math.random() - 0.5) * 5,
            life: 100
        });
    }
}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    particles.forEach((p, index) => {
        p.x += p.dx;
        p.y += p.dy;
        p.life--;

        ctx.beginPath();
        ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
        ctx.fillStyle = "white";
        ctx.fill();

        if (p.life <= 0) {
            particles.splice(index, 1);
        }
    });

    requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
