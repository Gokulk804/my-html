<div class="bg">
  <div class="card">
    <h1>Hi my love ❤️</h1>

    <div class="letter">
      <p class="line">I don’t say this enough…</p>
      <p class="line">but you are my calm</p>
      <p class="line">in a noisy world.</p>
      <p class="line">Every ordinary day</p>
      <p class="line">feels special with you.</p>

</div>
<style>
.signature {
  margin-top: 20px;
  font-family: "Dancing Script", cursive;
  font-size: 22px;
  opacity: 0;
  animation: write 1.2s ease forwards;
  animation-delay: 7.5s;
}
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: "Playfair Display", serif;
}

.bg {
  height: 100vh;
  background: linear-gradient(135deg, #fbc2eb, #a6c1ee);
  display: flex;
  align-items: center;
  justify-content: center;
}

.card {
  width: 360px;
  padding: 32px;
  border-radius: 20px;
  background: rgba(255, 255, 255, 0.28);
  backdrop-filter: blur(16px);
  box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
}

h1 {
  text-align: center;
  margin-bottom: 24px;
}

.letter {
  text-align: center;
}

.line {
  opacity: 0;
  transform: translateY(12px);
  animation: write 1.2s ease forwards;
}

/* Stagger each line */
.line:nth-child(1) { animation-delay: 0.5s; }
.line:nth-child(2) { animation-delay: 1.5s; }
.line:nth-child(3) { animation-delay: 2.5s; }
.line:nth-child(4) { animation-delay: 3.5s; }
.line:nth-child(5) { animation-delay: 4.5s; }
.line:nth-child(6) { animation-delay: 5.5s; }
.line:nth-child(7) { animation-delay: 6.5s; }

@keyframes write {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

</Style>
